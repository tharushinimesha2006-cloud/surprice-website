<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Love Story 💖</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

.fade{
animation:fadeIn 3s ease-in-out;
text-align:center;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

.box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
text-align:center;
width:85%;
max-width:400px;
}

input{
padding:10px;
width:80%;
border-radius:10px;
border:none;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

h1{
font-weight:300;
}
</style>
</head>

<body>

<div class="fade">

<h1>💖 A Love Story Begins...</h1>

<div class="box">
<p>Enter your name to unlock our story</p>
<input id="name" placeholder="Your name">
<br>
<button onclick="check()">Unlock</button>
</div>

</div>

<script>
function check(){
let name=document.getElementById("name").value.toLowerCase();

if(name.includes("sudu")){
window.location.href="gift.html";
}else{
alert("This story is only for SUDU 💖");
}
}
</script>

</body>
</html>
